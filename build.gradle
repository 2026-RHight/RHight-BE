plugins {
	id 'java'
	id 'org.springframework.boot' version '3.5.11'
	id 'io.spring.dependency-management' version '1.1.7'
    id 'com.diffplug.spotless' version '7.2.1'
}
ext {
    springModulithVersion = "1.4.8"
}

spotless {
    java {
        // 적용할 파일 범위 지정
        target 'src/*/java/**/*.java'

        // 1. 구글 자바 포맷 적용 (AOSP 스타일은 4스페이스를 사용해 윈도우/맥 가독성이 좋습니다)
        googleJavaFormat().aosp()

        // 2. 사용하지 않는 import 제거
        removeUnusedImports()

        // 3. 공통 스타일 규칙
        trimTrailingWhitespace()   // 줄 끝 공백 제거
        endWithNewline()           // 파일 끝에 빈 줄 추가

    }
}

group = 'com.reverse'
version = '0.0.1-SNAPSHOT'
description = 'rhight'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(17)
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.8.0'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.projectlombok:lombok'
    implementation 'org.springframework.modulith:spring-modulith-starter-core'
    implementation 'org.springframework.modulith:spring-modulith-starter-jpa'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.modulith:spring-modulith-starter-test'
    runtimeOnly 'org.mariadb.jdbc:mariadb-java-client'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}
dependencyManagement {
    imports {
        mavenBom "org.springframework.modulith:spring-modulith-bom:$springModulithVersion"
    }
}

tasks.named('test') {
	useJUnitPlatform()
}

tasks.register('installLocalGitHook', Copy) {
    from new File(rootProject.rootDir, 'scripts/pre-commit')
    into { new File(rootProject.rootDir, '.git/hooks') }
    // 맥/리눅스 유저를 위한 실행 권한 부여
    fileMode 0775
}

// 빌드할 때마다 자동으로 실행되도록 설정
build.dependsOn installLocalGitHook